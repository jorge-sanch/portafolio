<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Vitalium</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/registro.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./logo.png">

</head>

<body>
    <!-- Navbar Container -->
    <header id="navbar-container">
        <!-- El navbar se carga aquí automáticamente -->
    </header>
    <div class="registro-container">
        <div class="registro-card">
            <!-- Encabezado -->
            <div class="registro-header">
                <h1>Crear Cuenta</h1>
                <p>Únete a la familia Vittalium y comienza tu camino hacia el bienestar</p>
            </div>

            <!-- Formulario -->
            <form class="registro-form" id="form-registro">
                <!-- Nombre y Apellido -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="nombre">Nombre *</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            <input type="text" id="nombre" name="nombre" placeholder="Juan" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="apellido">Apellido *</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            <input type="text" id="apellido" name="apellido" placeholder="Pérez" required>
                        </div>
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email *</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                            </path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                    </div>
                </div>

                <!-- Teléfono -->
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path
                                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                            </path>
                        </svg>
                        <input type="tel" id="telefono" name="telefono" placeholder="+1 234 567 890">
                    </div>
                </div>

                <!-- Contraseña -->
                <div class="form-group">
                    <label for="password">Contraseña *</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" aria-label="Mostrar contraseña">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Confirmar Contraseña -->
                <div class="form-group">
                    <label for="password-confirm">Confirmar Contraseña *</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="password-confirm" name="password-confirm" placeholder="••••••••"
                            required>
                        <button type="button" class="toggle-password" aria-label="Mostrar contraseña">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Términos y condiciones -->
                <div class="terminos-group">
                    <label class="checkbox-container">
                        <input type="checkbox" name="terminos" required>
                        <span class="checkmark"></span>
                        <span class="checkbox-text">
                            Acepto los <a href="terminosYCondiciones.html#terminos" class="link-terminos">términos y condiciones</a> y la
                            <a href="terminosYCondiciones.html#aviso" class="link-terminos">política de privacidad</a> *
                        </span>
                    </label>

                    <label class="checkbox-container">
                        <input type="checkbox" name="newsletter">
                        <span class="checkmark"></span>
                        <span class="checkbox-text">
                            Deseo recibir ofertas especiales y novedades por email
                        </span>
                    </label>
                </div>

                <!-- Botón Crear Cuenta -->
                <button type="submit" class="btn-crear-cuenta">Crear Cuenta</button>
            </form>

            <!-- Separador -->
            <div class="divider">
                <span class="divider-text">O regístrate con</span>
            </div>

            <!-- Botones Redes Sociales -->
            <div class="social-buttons">
                <button type="button" class="btn-social btn-google">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Google
                </button>

                <button type="button" class="btn-social btn-facebook">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
                        <path
                            d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                    </svg>
                    Facebook
                </button>
            </div>

            <!-- Ya tienes cuenta -->
            <div class="login-link">
                <span>¿Ya tienes una cuenta?</span>
                <a href="login.html" class="link-inicio-sesion">Inicia sesión aquí</a>
            </div>

            <!-- Volver al inicio -->
            <div class="registro-footer">
                <a href="index.html" class="link-inicio">← Volver al inicio</a>
            </div>
        </div>

        <!-- Beneficios -->
        <div class="beneficios-container">
            <div class="beneficio-card">
                <div class="beneficio-icon">🎁</div>
                <h3>Obtén un 10% de descuento en tu primera compra</h3>
            </div>

            <div class="beneficio-card">
                <div class="beneficio-icon">🚚</div>
                <h3>Envío gratis en pedidos mayores a $50</h3>
            </div>

            <div class="beneficio-card">
                <div class="beneficio-icon">⭐</div>
                <h3>Acceso exclusivo a ofertas especiales</h3>
            </div>
        </div>
    </div>

    <!-- Footer Container -->
    <div id="footer-container">
        <!-- El footer se carga aquí automáticamente -->
    </div>

    <!-- Script para cargar componentes -->
    <script src="./js/auth.js"></script>
    <script src="./js/components.js"></script>
    <script src="./js/navbar.js"></script>
    <script src="./js/registro.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
