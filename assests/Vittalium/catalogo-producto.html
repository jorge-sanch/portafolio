<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Vitalium</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/productos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./logo.png">
</head>
<body>
    <!-- Navbar Container -->
    <header id="navbar-container"></header>

    <!-- Sección de Productos -->
    <section class="productos-section">
        <h1 class="productos-titulo">Nuestros Productos</h1>

        <!-- Filtros -->
        <div class="filtros">
            <button class="filtro-btn active">Todos</button>
            <button class="filtro-btn">Vitaminas</button>
            <button class="filtro-btn">Proteínas</button>
            <button class="filtro-btn">Naturales</button>
        </div>

        <!-- Grid de Productos (se llenará dinámicamente) -->
        <div class="productos-grid">
            <!-- Los productos se cargarán aquí desde productos.js -->
        </div>
    </section>

    <!-- Footer Container -->
    <div id="footer-container"></div>

    <!-- Scripts -->
    <script src="./js/navbar.js"></script>
    <script src="./js/components.js"></script>
    <script src="./js/productos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/auth.js"></script>
</body>
</html>
